services:
  postgres:
    image: postgres:16-alpine
    container_name: afriqx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: afriqx
      POSTGRES_PASSWORD: afriqx
      POSTGRES_DB: afriqx
    ports:
      - "5432:5432"
    volumes:
      - afriqx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afriqx -d afriqx"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  afriqx_pgdata:
